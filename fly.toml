# Fly.io config. Single machine (SQLite lives on one attached volume — do not
# scale to >1 machine, each would get a separate disk). Built remotely by Fly.
app = "job-hunt-copilot"
primary_region = "sjc"  # San Jose — closest Fly region to the user (Seattle)

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep the machine running so supercronic's scheduled jobs actually fire.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/api/health"

[[mounts]]
  source = "data"          # `fly volumes create data --size 1`
  destination = "/app/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"
  cpus = 1
